name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "8.0.x"
  DOCKER_IMAGE_NAME: cauaholanda/provamedgroup
  # Altere 'seu-usuario-docker' para seu nome de usuário do Docker Hub

jobs:
  build-and-test:
    name: Build e Testes .NET
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restaurar dependências
        run: dotnet restore

      - name: Build da solução
        run: dotnet build --no-restore -c Release

      - name: Executar testes unitários
        run: dotnet test --no-build -c Release --verbosity normal --logger "trx" --results-directory TestResults

      - name: Publicar artefatos de teste (opcional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults

  docker-build-push:
    name: Build e Push da Imagem Docker
    needs: build-and-test # só executa se os testes passarem
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e tag da imagem
        run: |
          docker build -t ${{ env.DOCKER_IMAGE_NAME }}:latest .
          docker tag ${{ env.DOCKER_IMAGE_NAME }}:latest ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

      - name: Push para Docker Hub
        run: |
          docker push ${{ env.DOCKER_IMAGE_NAME }}:latest
          docker push ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

  deploy-test-environment:
    name: Deploy em ambiente de teste (local runner)
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Executar container da aplicação
        run: |
          docker pull ${{ env.DOCKER_IMAGE_NAME }}:latest
          docker run -d --name provamedgroup-test -p 8080:80 ${{ env.DOCKER_IMAGE_NAME }}:latest
          sleep 10  # aguarda a aplicação iniciar

      - name: Testar saúde da aplicação (endpoint /health)
        run: |
          # Se você tiver um endpoint de saúde, descomente:
          # curl --fail http://localhost:8080/health || exit 1
          echo "Aplicação iniciada com sucesso. Teste básico concluído."
          docker logs provamedgroup-test --tail 20

      - name: Limpar container de teste
        if: always()
        run: docker rm -f provamedgroup-test
